name: Run ExpenseBot

on:
  # Trigger manually from the GitHub Actions UI (for testing)
  workflow_dispatch:

  # Trigger via the GitHub API from an external scheduler (e.g. cron-job.org)
  # POST https://api.github.com/repos/<owner>/<repo>/dispatches
  # Body: {"event_type": "run-expense-bot"}
  repository_dispatch:
    types: [run-expense-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Write the GCP service account JSON from the secret to a temp file.
      # Using a Python step avoids shell quoting issues with multi-line JSON.
      - name: Write GCP credentials file
        shell: python
        env:
          GCP_JSON_CONTENT: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          import os
          with open("credentials.json", "w") as f:
              f.write(os.environ["GCP_JSON_CONTENT"])

      - name: Run ExpenseBot
        env:
          EMAIL_PASSWORD:        ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SENDER:          ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENTS:      ${{ secrets.EMAIL_RECIPIENTS }}
          DRIVE_FOLDER_ID:       ${{ secrets.DRIVE_FOLDER_ID }}
          HIGH_VALUE_THRESHOLD:  ${{ secrets.HIGH_VALUE_THRESHOLD }}
          REPORT_LABEL:          ${{ secrets.REPORT_LABEL }}
        run: python main.py
